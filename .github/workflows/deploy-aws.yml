name: Deploy to AWS (S3/CloudFront + Lambda)

# DNS cut over and this pipeline verified end-to-end (2026-07-06/07) --
# see infra/aws/MIGRATION_GUIDE.md. Now the real deploy trigger;
# firebase-deploy.yml is retired.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy-website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::405633560616:role/gha-cryptoprism-website-deploy
          aws-region: us-east-1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build marketing site
        run: npm run build

      - name: Sync to S3
        run: aws s3 sync dist/ s3://cryptoprism-io-prod --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E18P98ZSULDXD6 --paths "/*"

  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::405633560616:role/gha-cryptoprism-website-api-deploy
          aws-region: us-east-1

      - name: Install production dependencies
        working-directory: functions
        run: npm ci --omit=dev

      - name: Zip and deploy
        working-directory: functions
        run: |
          zip -r ../api-lambda.zip . -x "*.git*"
          aws lambda update-function-code --function-name cryptoprism-website-api --zip-file fileb://../api-lambda.zip
