name: Deploy to Firebase Hosting & Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (cryptoprism-io)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/274885489333/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@cryptoprism-io.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: cryptoprism-io

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Build marketing site (Vite → dist/) ──
      - name: Install dependencies (marketing)
        run: npm ci

      - name: Build marketing site
        run: npm run build

      # ── Build dashboard app (Next.js → app-dist/) ──
      # TODO: Uncomment when app repo is decided. Replace OWNER/REPO below.
      # - name: Checkout app source
      #   uses: actions/checkout@v4
      #   with:
      #     repository: OWNER/REPO
      #     path: _app-src
      #     token: ${{ secrets.APP_REPO_TOKEN }}
      #
      # - name: Install dependencies (app)
      #   run: cd _app-src && npm ci
      #
      # - name: Build app (static export)
      #   run: cd _app-src && npm run build
      #
      # - name: Copy app build to app-dist
      #   run: cp -r _app-src/out app-dist

      # ── Deploy ──
      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting:cryptoprism-io --project cryptoprism-io --token "$(gcloud auth print-access-token)"

      # ── Deploy API to Cloud Run ──
      - name: Authenticate to Google Cloud (social-data-pipeline)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/963362833537/locations/global/workloadIdentityPools/github/providers/github
          service_account: github-actions@social-data-pipeline-and-push.iam.gserviceaccount.com

      - name: Deploy API to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: cryptoprism-api
          source: functions
          region: us-central1
          project_id: social-data-pipeline-and-push
          env_vars: |
            PG_CONNECTION_STRING=${{ secrets.PG_CONNECTION_STRING }}
